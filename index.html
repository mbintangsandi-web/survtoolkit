<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURV TOOLKIT</title>
<link rel="stylesheet" href="shared/theme.css">
<style>

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 60px;
  }

  header.hero {
    text-align: center;
    margin-bottom: 44px;
  }
  header.hero .eyebrow { display: block; margin-bottom: 10px; }
  header.hero h1 {
    font-size: 30px;
    color: var(--text);
  }
  header.hero h1 span { color: var(--accent); }
  header.hero p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 10px 0 0;
  }

  /* ---------------------------------------------------------------
     Menu — vertical stack of large buttons, one job each.
     --------------------------------------------------------------- */
  .menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 24px;
    transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }
  a.menu-item:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    transform: translateX(2px);
  }
  .menu-item.disabled { opacity: 0.6; cursor: default; }
  .menu-item.disabled:hover { border-color: var(--border); background: var(--panel); transform: none; }

  .menu-item__icon {
    width: 42px;
    height: 42px;
    border-radius: 9px;
    background: var(--accent-dim);
    color: var(--accent-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
  }

  .menu-item__body { flex: 1; min-width: 0; }
  .menu-item__title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15.5px;
    color: var(--text);
  }
  .menu-item__desc {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 3px;
    line-height: 1.5;
  }

  .menu-item__status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  .menu-item__chevron {
    color: var(--text-faint);
    font-size: 18px;
    flex-shrink: 0;
  }
  a.menu-item:hover .menu-item__chevron { color: var(--accent); }

  footer {
    text-align: center;
    margin-top: 48px;
    font-size: 11.5px;
    color: var(--text-faint);
  }
</style>
</head>
<body>

  <div class="wrap">

    <header class="hero">
      <span class="eyebrow">Regional Network Operations</span>
      <h1>SURV<span> TOOLKIT</span></h1>
      <p>Pilih menu di bawah untuk mulai.</p>
    </header>

    <nav class="menu" id="menu"></nav>

    <footer id="lastvisit"></footer>

  </div>

<script src="shared/utils.js"></script>
<script>
  // ------------------------------------------------------------------
  // Menu utama — mengikuti diagram alur: 4 tombol besar.
  // "Report Daily OLT Down" dan "Alarm" membuka halaman berikutnya
  // (hub) yang menampilkan langkah/cabang di dalamnya. Tambah menu
  // baru cukup tambah satu entri di sini.
  // ------------------------------------------------------------------
  const MENU = [
    {
      icon: 'T3',
      title: 'Tiket Lebih Dari 3 Hari',
      desc: 'Rekap follow-up tiket yang belum selesai lebih dari 3 hari.',
      href: 'tools/followup-ticket.html',
      status: 'planned',
    },
    {
      icon: 'O8',
      title: 'OLT Down Lebih Dari 8 Jam',
      desc: 'Broadcast insiden OLT yang down lebih dari 8 jam.',
      href: 'tools/outage-broadcast.html',
      status: 'planned',
    },
    {
      icon: 'RPT',
      title: 'Report Daily OLT Down',
      desc: 'Alur: Split Done/Not Done → Sync → Daily Report.',
      href: 'tools/report-daily-olt-down.html',
      status: 'active',
    },
    {
      icon: 'ALM',
      title: 'Alarm',
      desc: 'Pilih sumber alarm: UNM atau NCE.',
      href: 'tools/alarm.html',
      status: 'active',
    },
  ];

  const menuEl = document.getElementById('menu');
  menuEl.innerHTML = MENU.map(m => {
    const isActive = m.status === 'active';
    const tag = isActive ? 'a' : 'div';
    const hrefAttr = isActive ? `href="${m.href}"` : '';
    const cls = isActive ? 'menu-item panel' : 'menu-item panel disabled';
    const dotClass = isActive ? 'dot--ok' : 'dot--idle';
    const statusLabel = isActive ? 'Aktif' : 'Segera';
    return `
      <${tag} class="${cls}" ${hrefAttr}>
        <div class="menu-item__icon">${m.icon}</div>
        <div class="menu-item__body">
          <div class="menu-item__title">${m.title}</div>
          <div class="menu-item__desc">${m.desc}</div>
        </div>
        <div class="menu-item__status"><span class="dot ${dotClass}"></span>${statusLabel}</div>
        <div class="menu-item__chevron">${isActive ? '›' : ''}</div>
      </${tag}>
    `;
  }).join('');

  document.getElementById('lastvisit').textContent =
    'SURV TOOLKIT · dimuat ' + NetopsUtils.formatTimestampID(new Date());
</script>

</body>
</html>
