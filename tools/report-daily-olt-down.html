<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Daily OLT Down · NOC TOOLKIT</title>
<link rel="stylesheet" href="../shared/theme.css">
<style>

  .wrap { max-width: 640px; margin: 0 auto; padding: 40px 24px 60px; }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  .back:hover { color: var(--accent); }

  header.hero { margin-bottom: 36px; }
  header.hero .eyebrow { display: block; margin-bottom: 8px; }
  header.hero h1 { font-size: 24px; }
  header.hero p { color: var(--text-dim); font-size: 14px; margin: 8px 0 0; line-height: 1.6; }

  /* ---------------------------------------------------------------
     Sequential flow — numbering is meaningful here: this is a real
     3-step pipeline, each step depends on the previous one's output.
     --------------------------------------------------------------- */
  .flow { display: flex; flex-direction: column; }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 18px;
  }

  .step__rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .step__num {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step.idle .step__num { background: var(--signal-idle); }
  .step__line {
    width: 2px;
    flex: 1;
    background: var(--border-bright);
    margin: 4px 0;
    min-height: 28px;
  }

  .step__card {
    flex: 1;
    padding: 18px 20px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  a.step__card:hover { border-color: var(--accent); background: var(--accent-dim); }
  .step__card.disabled { opacity: 0.65; cursor: default; }

  .step__title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
  .step__desc { font-size: 12.5px; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }
</style>
</head>
<body>

  <div class="wrap">

    <a class="back" href="../index.html">← Menu Utama</a>

    <header class="hero">
      <span class="eyebrow">Alur Kerja</span>
      <h1>Report Daily OLT Down</h1>
      <p>Tiga langkah berurutan: pisahkan status device, sinkronkan hasil, lalu susun laporan harian. Klik langkah untuk membuka tool-nya.</p>
    </header>

    <div class="flow" id="flow"></div>

  </div>

<script src="../shared/utils.js"></script>
<script>
  const STEPS = [
    {
      title: 'Split Done / Not Done',
      desc: 'Pisahkan daftar device dari data mentah berdasarkan status DONE / NOT DONE.',
      href: 'done-notdone.html',
      status: 'active',
    },
    {
      title: 'Sync',
      desc: 'Sinkronkan hasil split dengan sumber data pembanding (dashboard/recap).',
      href: 'sync.html',
      status: 'active',
    },
    {
      title: 'Daily Report',
      desc: 'Susun hasil akhir menjadi format laporan harian siap kirim.',
      href: 'daily-report.html',
      status: 'active',
    },
  ];

  const flowEl = document.getElementById('flow');
  flowEl.innerHTML = STEPS.map((s, i) => {
    const isActive = s.status === 'active';
    const isLast = i === STEPS.length - 1;
    const tag = isActive ? 'a' : 'div';
    const hrefAttr = isActive ? `href="${s.href}"` : '';
    const cardCls = isActive ? 'step__card panel' : 'step__card panel disabled';
    return `
      <div class="step ${isActive ? '' : 'idle'}">
        <div class="step__rail">
          <div class="step__num">${i + 1}</div>
          ${isLast ? '' : '<div class="step__line"></div>'}
        </div>
        <${tag} class="${cardCls}" ${hrefAttr}>
          <div>
            <div class="step__title">${s.title}</div>
            <div class="step__desc">${s.desc}</div>
          </div>
        </${tag}>
      </div>
    `;
  }).join('');
</script>

</body>
</html>
