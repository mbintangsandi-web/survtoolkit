const DURATION_RE = /(\d+)\s*Hari(?:\s+(\d+)\s*Jam)?(?:\s+(\d+)\s*Menit)?/i;

function parseDuration(str) {
  const m = str.match(DURATION_RE);
  if (!m) return null;
  const d = parseInt(m[1] || 0);
  const h = parseInt(m[2] || 0);
  const mn = parseInt(m[3] || 0);
  return { days: d, hours: h, minutes: mn, raw: str.trim() };
}

function isDurationLine(line) {
  return DURATION_RE.test(line);
}

function isRegionHeader(line) {
  return REGIONS.includes(line.trim().toUpperCase());
}

function isDeviceLine(line) {
  // device: not a region header, not a duration line, non-empty, alphanumeric
  return line.trim().length > 0 && !isRegionHeader(line) && !isDurationLine(line);
}

function formatDuration(d) {
  let parts = [];
  if (d.days > 0) parts.push(`${d.days} Hari`);
  if (d.hours > 0) parts.push(`${d.hours} Jam`);
  if (d.minutes > 0) parts.push(`${d.minutes} Menit`);
  return parts.join(' ') || '0 Menit';
}

function getNow() {
  const now = new Date();
  const HH = String(now.getHours()).padStart(2,'0');
  const MM = String(now.getMinutes()).padStart(2,'0');
  const DD = String(now.getDate()).padStart(2,'0');
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const YYYY = now.getFullYear();
  return `${HH}:${MM} ${DD}/${mo}/${YYYY}`;
}

function processData() {
  const raw = document.getElementById('inputData').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  // Parse: group by region, collect devices with duration
  const regions = {}; // region -> [{device, duration}]
  let currentRegion = null;
  let pendingDevice = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (isRegionHeader(line)) {
      currentRegion = line.toUpperCase();
      if (!regions[currentRegion]) regions[currentRegion] = [];
      pendingDevice = null;
    } else if (currentRegion) {
      if (isDurationLine(line)) {
        const dur = parseDuration(line);
        if (pendingDevice && dur) {
          regions[currentRegion].push({ device: pendingDevice, duration: dur });
          pendingDevice = null;
        }
      } else if (isDeviceLine(line)) {
        pendingDevice = line;
      }
    }
  }

  // Build output
  const timestamp = getNow();
  let out = `Follow Up Tiket SBU Lebih Dari 3 Hari\n${timestamp}\n`;

  const regionOrder = REGIONS.filter(r => regions[r] && regions[r].length > 0);

  let no = 1;
  let totalAll = 0;

  for (const region of regionOrder) {
    const tickets = regions[region];
    if (!tickets || tickets.length === 0) continue;
    totalAll += tickets.length;
    out += `\n${no}. ${region} : ${tickets.length} Tiket\n`;
    for (const t of tickets) {
      out += `${t.device}  (${formatDuration(t.duration)})\n`;
    }
    no++;
  }

  // Stats
  document.getElementById('stats').innerHTML =
    `<div class="stat">Region: <span>${regionOrder.length}</span></div>` +
    `<div class="stat">Total Tiket: <span>${totalAll}</span></div>`;

  document.getElementById('output-box').textContent = out.trim();
  const sec = document.getElementById('output-section');
  sec.style.display = 'block';
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyOutput() {
  const text = document.getElementById('output-box').textContent;
  navigator.clipboard.writeText(text).then(() => showToast());
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function fillSample() {
  document.getElementById('inputData').value = SAMPLE;
}

function resetAll() {
  document.getElementById('inputData').value = '';
  document.getElementById('output-section').style.display = 'none';
  document.getElementById('output-box').textContent = '';
  document.getElementById('stats').innerHTML = '';
}
